  Scrobble Last.fm plays with Jellyfin.
category: "Music"
owner: "danielfariati"
artifacts:
  - "Jellyfin.Plugin.Lastfm.dll"
changelog: >
  Scrobbles that Last.fm silently drops are now logged as warnings with the reason,
  instead of being reported as successful. Last.fm answers those with a normal HTTP 200
  and no error code, so they were previously indistinguishable from accepted scrobbles
  in the logs. This does not change which scrobbles are accepted, it only makes the
  rejected ones visible.
