artifacts:
  - "Jellyfin.Plugin.Lastfm.dll"
changelog: >
  Scrobble log messages now include the exact data sent to Last.fm, url encoded and without
  the credentials, so a rejected scrobble can be replayed as is. This also covers the album
  artist and the MusicBrainz id, which were never logged before, and makes characters that
  are invisible in a log, such as non breaking spaces in artist names, easy to spot. This
  only changes logging, scrobbling behaviour is unchanged.
